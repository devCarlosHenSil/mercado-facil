name: CI/CD MercadoFácil

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Go ────────────────────────────────────────────────────────────
  backend:
    name: Go build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -coverprofile=coverage.out

  # ── Frontend React ────────────────────────────────────────────────────────
  frontend:
    name: React build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Usa o secret se existir, senão fallback para localhost
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'http://localhost:8080' }}

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

